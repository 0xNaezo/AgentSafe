version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"

  - package-ecosystem: cargo
    directory: /anchor_program
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(rust)"

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(web)"

  - package-ecosystem: npm
    directory: /anchor_program
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(anchor-js)"
