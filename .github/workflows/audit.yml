name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - "anchor_program/Cargo.lock"
      - "anchor_program/**/Cargo.toml"
  pull_request:
    branches: [main]
    paths:
      - "anchor_program/Cargo.lock"
      - "anchor_program/**/Cargo.toml"

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@e762cc4bcfeb7d35a09c6ebb32b0e7222b74690c

      - name: Cache cargo audit data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('anchor_program/Cargo.lock') }}
          restore-keys: cargo-audit-${{ runner.os }}-

      - name: Run cargo audit
        working-directory: anchor_program
        run: cargo audit
