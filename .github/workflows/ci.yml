name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  anchor:
    name: Anchor program
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anchor_program
    env:
      ANCHOR_VERSION: 1.0.2
      SOLANA_VERSION: v3.1.10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            libudev-dev \
            pkg-config \
            protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: clippy,rustfmt

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: anchor_program/yarn.lock

      - name: Install Anchor JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: cargo install anchor-cli --version "$ANCHOR_VERSION" --locked

      - name: Check Anchor JavaScript formatting
        run: yarn lint

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check Rust compilation
        run: cargo check --workspace --all-targets --locked

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Build Anchor program and IDL
        run: anchor build --ignore-keys

  web:
    name: Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
