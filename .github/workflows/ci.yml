name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  anchor:
    name: Anchor program
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: anchor_program
    env:
      ANCHOR_VERSION: 1.0.2
      ANCHOR_CLI_SHA256: 51c158a7b66db6d9802afe59cd73e6d78928791114b55567de5c0732e88770eb
      RUST_TOOLCHAIN: 1.89.0
      SOLANA_VERSION: v3.1.10
      SOLANA_INSTALLER_SHA256: dfd8afbff06d8c0302e11c2fbead5464d5c773097af97c772f3df8470677e130
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            libudev-dev \
            pkg-config \
            protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@193d6aa1dbbc28bd2c0a6b0e327cfdce68baaf6e
        with:
          components: clippy,rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            anchor_program/target
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ env.SOLANA_VERSION }}-${{ hashFiles('anchor_program/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ env.SOLANA_VERSION }}-
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-
            cargo-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: anchor_program/yarn.lock

      - name: Install Anchor JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Install Solana CLI
        run: |
          # SOLANA_INSTALLER_SHA256 is the known-good hash for the installer served by SOLANA_VERSION.
          # Update both values together whenever SOLANA_VERSION changes.
          installer="$(mktemp)"
          curl -fsSL "https://release.anza.xyz/${SOLANA_VERSION}/install" -o "$installer"
          echo "${SOLANA_INSTALLER_SHA256}  $installer" | sha256sum --check
          sh "$installer"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          anchor_bin="$(mktemp)"
          curl -fsSL "https://github.com/coral-xyz/anchor/releases/download/v${ANCHOR_VERSION}/anchor-${ANCHOR_VERSION}-x86_64-unknown-linux-gnu" -o "$anchor_bin"
          echo "${ANCHOR_CLI_SHA256}  $anchor_bin" | sha256sum --check
          sudo install -m 0755 "$anchor_bin" /usr/local/bin/anchor
          anchor --version

      - name: Create Solana CI wallet
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase --silent --outfile "$HOME/.config/solana/id.json"

      - name: Check Anchor JavaScript formatting
        run: yarn lint

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check Rust compilation
        run: cargo check --workspace --all-targets --locked

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build Anchor program and IDL
        run: anchor build --ignore-keys

      - name: Run Anchor TypeScript tests
        run: anchor test --skip-build --skip-lint --validator legacy

      - name: Run Rust tests
        run: cargo test --workspace --locked

  web:
    name: Web app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_DEMO_TOKEN_MINT: ${{ secrets.NEXT_PUBLIC_DEMO_TOKEN_MINT }}
          NEXT_PUBLIC_SOLANA_RPC_URL: ${{ secrets.NEXT_PUBLIC_SOLANA_RPC_URL }}
